<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Guy - Login/Register</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

  <div class="container welcome-container">
    <h1>Welcome to CV Guy</h1>
    <div class="auth-forms">
      <div class="form-section login-section active" id="loginSection">
        <h2>Login</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginUsername">Username/Email:</label>
            <input type="text" id="loginUsername" name="loginUsername" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password:</label>
            <input type="password" id="loginPassword" name="loginPassword" required>
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
          <p class="form-switch">Don't have an account? <a href="#" id="showRegister">Register here</a></p>
          <div id="loginMessage" class="validation-message"></div>
        </form>
      </div>

      <div class="form-section register-section" id="registerSection">
        <h2>Register</h2>
        <form id="registerForm">
          <div class="form-group">
            <label for="registerFullName">Full Name:</label>
            <input type="text" id="registerFullName" name="registerFullName" required>
          </div>
          <div class="form-group">
            <label for="registerEmail">Email:</label>
            <input type="email" id="registerEmail" name="registerEmail" required>
          </div>
          <div class="form-group">
            <label for="registerPassword">Password:</label>
            <input type="password" id="registerPassword" name="registerPassword" required>
          </div>
          <div class="form-group">
            <label for="registerReenterPassword">Re-enter Password:</label>
            <input type="password" id="registerReenterPassword" name="registerReenterPassword" required>
          </div>
          <button type="submit" class="btn btn-primary">Register</button>
          <p class="form-switch">Already have an account? <a href="#" id="showLogin">Login here</a></p>
          <div id="registerMessage" class="validation-message"></div>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginSection = document.getElementById('loginSection');
      const registerSection = document.getElementById('registerSection');
      const showRegisterLink = document.getElementById('showRegister');
      const showLoginLink = document.getElementById('showLogin');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const loginMessage = document.getElementById('loginMessage');
      const registerMessage = document.getElementById('registerMessage');

      showRegisterLink.addEventListener('click', (e) => {
        e.preventDefault();
        loginSection.classList.remove('active');
        registerSection.classList.add('active');
        loginMessage.textContent = ''; // Clear messages
        registerMessage.textContent = '';
      });

      showLoginLink.addEventListener('click', (e) => {
        e.preventDefault();
        registerSection.classList.remove('active');
        loginSection.classList.add('active');
        loginMessage.textContent = ''; // Clear messages
        registerMessage.textContent = '';
      });

      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        // In a real application, you'd send this data to a server for authentication.
        // For this example, we'll just simulate a successful login.
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;

        if (username && password) {
          loginMessage.textContent = '';
          alert('Login successful! Redirecting to main page.');
          window.location.href = 'mainpage.html'; // Redirect to the main resume builder page
        } else {
          loginMessage.textContent = 'Please enter username/email and password.';
        }
      });

      registerForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const password = document.getElementById('registerPassword').value;
        const reenterPassword = document.getElementById('registerReenterPassword').value;
        const fullName = document.getElementById('registerFullName').value;
        const email = document.getElementById('registerEmail').value;

        registerMessage.textContent = ''; // Clear previous messages

        if (!fullName || !email || !password || !reenterPassword) {
          registerMessage.textContent = 'Please fill in all fields.';
          return;
        }

        if (password !== reenterPassword) {
          registerMessage.textContent = 'Passwords do not match!';
          return;
        }

        // In a real application, you'd send this data to a server for user creation.
        // For this example, we'll just simulate successful registration.
        alert('Registration successful! Please log in.');
        registerSection.classList.remove('active');
        loginSection.classList.add('active');
        registerForm.reset(); // Clear the form
        loginMessage.textContent = 'Registration successful! Please log in.';
      });
    });
  </script>
</body>
</html>
